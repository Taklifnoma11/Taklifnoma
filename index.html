<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taklif</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
    padding: 20px;
    overflow: hidden;
    position: relative;
  }
  .heart {
    position: fixed;
    top: -10%;
    font-size: 24px;
    opacity: 0.6;
    animation: fall linear infinite;
    pointer-events: none;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); }
  }
  .card {
    background: rgba(255,255,255,0.95);
    border-radius: 24px;
    padding: 40px 30px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    position: relative;
    z-index: 2;
    overflow: hidden;
  }
  .card-banner {
    margin: -40px -30px 20px -30px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-banner svg { width: 100%; height: 100%; display: block; }
  h1 { color: #e0245e; font-size: 22px; margin-bottom: 10px; }
  p { color: #555; font-size: 16px; line-height: 1.5; }
  #qrcode { display: inline-block; margin: 20px auto; padding: 12px; background: white; border-radius: 16px; }
  .btns { display: flex; gap: 16px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
  button {
    font-size: 18px;
    font-weight: 600;
    padding: 14px 32px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  button:active { transform: scale(0.95); }
  .yes-btn { background: #ff4d6d; color: white; box-shadow: 0 6px 16px rgba(255,77,109,0.4); }
  .no-btn { background: #e0e0e0; color: #555; transition: transform 0.15s ease, left 0.2s ease, top 0.2s ease; }
  .no-btn.roaming { position: fixed; z-index: 50; }
  .final { font-size: 60px; animation: pop 0.5s ease; }
  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .retry-msg { color: #ff4d6d; font-weight: 600; margin-top: 10px; min-height: 24px; }
  .small { font-size: 13px; color: #999; margin-top: 20px; }
  input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #ffc2d1; font-size: 16px; text-align: center; margin-top: 10px; }
</style>
</head>
<body>

<div class="card" id="card"></div>

<script>
/* ==========================================================
   SOZLASH (CONFIG)
   GitHub Pages'ga joylashtirgandan keyin, saytingiz manzilini
   shu yerga yozing. Masalan:
   const BASE_URL = "https://foydalanuvchi-nomi.github.io/repo-nomi/";
   Bo'sh qoldirsangiz, sayt hozirgi manzilini o'zi aniqlaydi
   (lokal tekshirish uchun mos, lekin telefonlar orasida
   ishlashi uchun GitHub Pages manzilini yozish shart).
   ========================================================== */
const BASE_URL = "https://taklifnoma11.github.io/Taklifnoma/";

/* Statistikani masofadan saqlash uchun oddiy bepul hisoblagich
   (faqat "Yo'q" bosilgan sonini saqlaydi, hech kimga ko'rinmaydi,
   faqat siz ?admin=1 orqali ko'rasiz).
   Diqqat: kalit (COUNTER_KEY) ochiq bo'lgani uchun uni topganlar
   ham qiymatini ko'ra oladi, lekin kalit nomi taxmin qilib
   bo'lmaydigan darajada noyob qilingan. */
const COUNTER_KEY = "taklifnoma11-yoq-soni-x7k2m9-2026";

/* Telegram orqali xabar yuborish uchun (kim qanday javob berganini
   sizga to'g'ridan-to'g'ri Telegram'da ko'rsatadi).
   Diqqat: bu token sahifa manbasida ko'rinadi (client-side), shuning
   uchun uni faqat shu maqsad uchun ishlating va boshqa joyda
   ishlatmang. */
const TELEGRAM_BOT_TOKEN = "8947967987:AAHTEOuxv8H_JnV0t6fbXucJdokS4sQeclY";
const TELEGRAM_CHAT_ID = "5989643990";

function sendTelegram(text) {
  const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(text)}`;
  fetch(url).catch(() => {});
}

const params = new URLSearchParams(window.location.search);
const isAsk = params.get('ask') === '1';
const isAdmin = params.get('admin') === '1';
const card = document.getElementById('card');

function buildLink(queryStr) {
  if (BASE_URL) {
    return BASE_URL.replace(/\/?$/, '') + '/' + queryStr;
  }
  return window.location.origin + window.location.pathname + queryStr;
}

let userName = '';

const cardBanner = `
  <div class="card-banner">
    <svg viewBox="0 0 400 140" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ff7a9c"/>
          <stop offset="100%" stop-color="#ffb6c9"/>
        </linearGradient>
      </defs>
      <rect width="400" height="140" fill="url(#bgGrad)"/>
      <circle cx="60" cy="30" r="14" fill="#ffffff" opacity="0.25"/>
      <circle cx="340" cy="100" r="20" fill="#ffffff" opacity="0.2"/>
      <circle cx="320" cy="25" r="8" fill="#ffffff" opacity="0.3"/>
      <path d="M200 105 C170 75, 130 65, 130 40 C130 22, 150 12, 165 25 C175 33, 200 55, 200 55 C200 55, 225 33, 235 25 C250 12, 270 22, 270 40 C270 65, 230 75, 200 105 Z" fill="#ffffff"/>
      <circle cx="100" cy="60" r="5" fill="#ffffff" opacity="0.6"/>
      <circle cx="300" cy="55" r="6" fill="#ffffff" opacity="0.6"/>
      <circle cx="90" cy="100" r="4" fill="#ffffff" opacity="0.5"/>
    </svg>
  </div>
`;

function renderNameForm() {
  card.innerHTML = `
    ${cardBanner}
    <div style="font-size:50px;">💌</div>
    <h1>Assalomu alaykum!</h1>
    <p>Avval ismingizni kiriting</p>
    <input id="nameInput" type="text" placeholder="Ismingiz...">
    <div class="btns">
      <button class="yes-btn" onclick="submitName()">Davom etish ➡️</button>
    </div>
  `;
}

function submitName() {
  const val = document.getElementById('nameInput').value.trim();
  userName = val || 'Aziz do\'stim';
  renderQuestion();
}

function renderQuestion() {
  card.innerHTML = `
    ${cardBanner}
    <div style="font-size:50px;">💌</div>
    <h1>${userName}, bitta savolim bor edi...</h1>
    <p id="question">Men bilan uchrashuvga chiqishga rozimisiz?</p>
    <div class="btns" id="btns">
      <button class="yes-btn" onclick="sayYes()">✅ Ha</button>
      <button class="no-btn" id="noBtn" onclick="sayNo()">❌ Yo'q</button>
    </div>
    <div class="retry-msg" id="retryMsg"></div>
  `;
}

const noMessages = [
  "Yana bir marta urinib ko'ring 🥺",
  "Iltimos, yaxshilab o'ylang... 🙏",
  "Sizsiz bo'lmaydi, yana bir bor 😢",
  "Yurak sizni kutmoqda, yana urining 💔➡️❤️"
];
let noCount = 0;

function sayNo() {
  noCount++;
  const msg = document.getElementById('retryMsg');
  msg.textContent = noMessages[Math.min(noCount - 1, noMessages.length - 1)];
  // Faqat sizga ko'rinishi uchun, hisobni fon rejimida serverga yuboramiz
  fetch(`https://countapi.mileshilliard.com/api/v1/hit/${COUNTER_KEY}`).catch(() => {});
  sendTelegram(`❌ ${userName} "Yo'q" dedi (${noCount}-marta)`);
  moveNoButton();
}

function moveNoButton() {
  const btn = document.getElementById('noBtn');
  if (!btn) return;
  btn.classList.add('roaming');
  const w = btn.offsetWidth || 120;
  const h = btn.offsetHeight || 50;
  const maxLeft = window.innerWidth - w - 16;
  const maxTop = window.innerHeight - h - 16;
  const left = Math.max(16, Math.floor(Math.random() * maxLeft));
  const top = Math.max(16, Math.floor(Math.random() * maxTop));
  btn.style.left = left + 'px';
  btn.style.top = top + 'px';
}

function sayYes() {
  sendTelegram(`✅ ${userName} "Ha" dedi! 🎉`);
  renderMovieForm();
}

function renderMovieForm() {
  card.innerHTML = `
    ${cardBanner}
    <div style="font-size:50px;">🎬</div>
    <h1>Ajoyib, ${userName}!</h1>
    <p>Keling, kinoga birga boramiz. Qaysi kino va qachon?</p>
    <input id="movieInput" type="text" placeholder="Kino nomi...">
    <input id="dateInput" type="datetime-local" style="margin-top:10px;">
    <div class="btns">
      <button class="yes-btn" onclick="submitMovie()">Yuborish 🎉</button>
    </div>
  `;
}

function submitMovie() {
  const movie = document.getElementById('movieInput').value.trim() || 'kiritilmagan';
  const rawDate = document.getElementById('dateInput').value;
  let dateText = 'kiritilmagan';
  if (rawDate) {
    const d = new Date(rawDate);
    dateText = d.toLocaleString('uz-UZ', { day: '2-digit', month: 'long', hour: '2-digit', minute: '2-digit' });
  }
  sendTelegram(`🎬 ${userName} bilan kino rejasi:\nKino: ${movie}\nQachon: ${dateText}`);
  renderFinal(movie, dateText);
}

function renderFinal(movie, dateText) {
  card.innerHTML = `
    ${cardBanner}
    <div class="final">🎉💍❤️</div>
    <h1>Rahmat, ${userName}!</h1>
    <p>"${movie}" kinosiga ${dateText} da ko'rishguncha! 😍</p>
  `;
  for (let i = 0; i < 30; i++) {
    setTimeout(() => spawnHeart(), i * 60);
  }
}

function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = ['❤️','💕','💖','💗'][Math.floor(Math.random()*4)];
  h.style.left = Math.random() * 100 + 'vw';
  h.style.fontSize = (16 + Math.random()*20) + 'px';
  h.style.animationDuration = (3 + Math.random()*3) + 's';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}
setInterval(spawnHeart, 700);

function renderHome() {
  const url = buildLink('?ask=1');
  card.innerHTML = `
    ${cardBanner}
    <div style="font-size:50px;">📱💘</div>
    <h1>QR kodni skanerlang</h1>
    <p>Bu QR kod so'rovnomaga olib boradi</p>
    <div id="qrcode"></div>
    <p class="small">Bu sahifani ko'rsating, u telefonidan skanerlasin</p>
  `;
  new QRCode(document.getElementById("qrcode"), {
    text: url,
    width: 200,
    height: 200,
    colorDark: "#e0245e",
    colorLight: "#ffffff"
  });
}

function renderAdmin() {
  card.innerHTML = `
    <div style="font-size:50px;">🔒📊</div>
    <h1>Faqat siz uchun</h1>
    <p id="adminResult">Yuklanmoqda...</p>
    <div class="btns">
      <button class="yes-btn" onclick="loadCount()">🔄 Yangilash</button>
    </div>
    <p class="small"><a href="?">Bosh sahifaga qaytish</a></p>
  `;
  loadCount();
}

function loadCount() {
  const el = document.getElementById('adminResult');
  el.textContent = "Yuklanmoqda...";
  fetch(`https://countapi.mileshilliard.com/api/v1/get/${COUNTER_KEY}`)
    .then(r => r.json())
    .then(data => {
      const count = data.value || 0;
      el.textContent = `"Yo'q" tugmasi jami ${count} marta bosilgan`;
    })
    .catch(() => { el.textContent = "Hozircha ma'lumot yo'q (hali hech kim 'Yo'q' bosmagan)"; });
}

if (isAdmin) {
  renderAdmin();
} else if (isAsk) {
  renderNameForm();
} else {
  renderHome();
}
</script>

</body>
</html>
